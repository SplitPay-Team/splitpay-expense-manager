<div class="install-container">
    <div class="install-card">
        <h2><span class="material-icons">storage</span> Installation - Step 2</h2>
        
        {{#if error}}
        <div class="alert error">
            <span class="material-icons">error</span>
            {{error}}
        </div>
        {{/if}}
        
        <p class="install-description">Please enter your MySQL database credentials.</p>
        
        <form action="install.php?step=2" method="POST" class="install-form">
            <div class="input-field-modern">
                <span class="material-icons icon-left">dns</span>
                <input type="text" id="db_host" name="db_host" value="localhost" required placeholder=" ">
                <label for="db_host">Database Host</label>
                <span class="input-help">Usually "localhost" or server address</span>
            </div>
            
            <div class="input-field-modern">
                <span class="material-icons icon-left">person</span>
                <input type="text" id="db_user" name="db_user" required placeholder=" ">
                <label for="db_user">Database Username</label>
                <span class="input-help">Your MySQL username</span>
            </div>
            
            <div class="input-field-modern">
                <span class="material-icons icon-left">lock</span>
                <input type="text" id="db_pass" name="db_pass" placeholder=" ">
                <label for="db_pass">Database Password</label>
                <span class="input-help">Leave empty if no password</span>
            </div>
            
            <div class="input-field-modern">
                <span class="material-icons icon-left">storage</span>
                <input type="text" id="db_name" name="db_name" required placeholder=" ">
                <label for="db_name">Database Name</label>
                <span class="input-help">Name of the database to create/use</span>
            </div>
            
            <div class="form-actions">
                <button type="submit" class="btn primary">
                    <span class="material-icons">check_circle</span>
                    Install
                </button>
            </div>
        </form>
    </div>
</div>
