<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — SplitPay</title>
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <div class="logo-icon">✦</div>
      <h1>SplitPay</h1>
    </div>

    <p class="auth-subtitle">Welcome back. Sign in to manage your group expenses.</p>

    <div id="alert-container"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Email Address <span class="required">*</span></label>
        <input type="email" id="email" name="email" class="form-control"
               placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password <span class="required">*</span></label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <div class="mt-24">
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
          Sign In
        </button>
      </div>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="/pages/register.php">Create one</a>
    </div>

  </div>
</div>

<script src="/assets/js/main.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  Form.clearErrors(this);

  const btn = document.getElementById('submit-btn');
  Form.setLoading(btn, true);

  const data = {
    email:    document.getElementById('email').value.trim(),
    password: document.getElementById('password').value
  };

  if (!data.email || !data.password) {
    Toast.error('Please fill in all fields.');
    Form.setLoading(btn, false);
    return;
  }

  try {
    const res = await API.post('auth', 'login', data);
    if (res.success) {
      Toast.success('Welcome back!');
      setTimeout(() => window.location.href = '/pages/dashboard.php', 600);
    } else {
      const container = document.getElementById('alert-container');
      container.innerHTML = `
        <div class="alert alert-danger">
          <span class="alert-icon">✕</span>
          <span>${res.error || 'Invalid email or password.'}</span>
        </div>`;
      Form.setLoading(btn, false);
    }
  } catch(err) {
    Toast.error('Connection error. Please try again.');
    Form.setLoading(btn, false);
  }
});
</script>
</body>
</html>
